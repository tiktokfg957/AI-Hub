<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Фото | AI-Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .generator-container {
            max-width: 700px; margin: 40px auto; background: rgba(20,20,40,0.5);
            backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid rgba(168,85,247,0.3);
            padding: 32px; text-align: center;
        }
        textarea {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(168,85,247,0.5);
            border-radius: 24px; padding: 16px; color: white; font-size: 1rem; resize: vertical; margin: 20px 0;
        }
        .generate-btn {
            background: linear-gradient(90deg, #a855f7, #ec4899); border: none; padding: 12px 32px;
            border-radius: 40px; font-weight: 600; cursor: pointer; color: white;
        }
        .result-area {
            margin-top: 30px; padding: 20px; background: rgba(0,0,0,0.3); border-radius: 24px;
            min-height: 200px; display: flex; align-items: center; justify-content: center; color: #aaa;
        }
        .back-btn { margin-bottom: 16px; display: inline-block; background: none; border: none; color: #a855f7; cursor: pointer; font-size: 1rem; }
        .price-tag {
            display: inline-block; background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.5);
            border-radius: 20px; padding: 4px 12px; margin: 12px 0; color: #FFD700; font-size: 0.9rem;
        }
        .price-tag i { margin-right: 4px; }

        /* auth styles */
        .auth-area { display: flex; align-items: center; gap: 12px; }
        .glass-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .glass-btn:hover { background: rgba(168,85,247,0.3); border-color: #a855f7; }
        .profile-info { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(168,85,247,0.4); border-radius: 40px; padding: 6px 18px 6px 12px; }
        .user-data { display: flex; flex-direction: column; color: #fff; }
        .user-name { font-weight: 600; font-size: 0.9rem; }
        .user-id { font-size: 0.7rem; color: #a855f7; }
        .balance-area { display: flex; align-items: center; gap: 6px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4); border-radius: 20px; padding: 4px 10px; }
        .balance-area .coin-icon { color: #FFD700; font-size: 1rem; }
        .balance-amount { font-weight: 600; color: #FFD700; font-size: 0.9rem; }
        .topup-btn { background: rgba(168,85,247,0.2); border: 1px solid #a855f7; color: #a855f7; font-size: 0.85rem; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .logout-btn { background: none; border: none; color: #ff4d6a; font-size: 1.1rem; cursor: pointer; padding: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(20,20,40,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(168,85,247,0.4); border-radius: 32px; padding: 32px; max-width: 400px; width: 90%; position: relative; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; }
        .modal-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: 500; color: #aaa; transition: 0.2s; border-bottom: 2px solid transparent; }
        .modal-tab.active { color: #a855f7; border-bottom-color: #a855f7; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #ccc; }
        .form-group input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(168,85,247,0.5); border-radius: 12px; padding: 12px; color: white; font-family: 'Inter', sans-serif; }
        .form-group input:focus { outline: none; border-color: #a855f7; }
        .error-msg { color: #ff6b7a; font-size: 0.8rem; margin-top: 4px; display: none; }
        .submit-btn { background: linear-gradient(90deg, #a855f7, #ec4899); border: none; width: 100%; padding: 12px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
        .package-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .package-btn { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.4); border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; color: #fff; }
        .package-btn:hover { background: rgba(168,85,247,0.3); border-color: #a855f7; }
        .package-amount { font-size: 1.2rem; font-weight: 700; color: #FFD700; }
        .package-price { font-size: 0.85rem; color: #aaa; }
        .custom-amount { display: flex; gap: 10px; align-items: center; }
        .custom-amount input { flex: 1; }
        .price-estimate { margin: 8px 0; font-size: 0.9rem; color: #FFD700; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span>AI-Hub</span>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="about.html">О нас</a>
                <a href="blog.html">Блог</a>
                <a href="contacts.html">Контакты</a>
            </nav>
            <div class="auth-area" id="authArea">
                <button class="glass-btn" id="authBtn">Войти</button>
            </div>
        </header>

        <div style="margin-bottom: 24px;">
            <button class="back-btn" onclick="history.back()">← Назад</button>
        </div>

        <div class="generator-container">
            <div class="card-header" style="justify-content: center;">
                <div class="card-icon"><i class="fas fa-camera-retro"></i></div>
                <h2>Генератор изображений</h2>
            </div>
            <p>Опишите, что вы хотите увидеть. AI создаст уникальную картинку.</p>
            <textarea id="promptInput" rows="4" placeholder="Например: «Космический корабль над киберпанк-городом, неон, дождь»"></textarea>
            <div class="price-tag" id="photoPriceTag" style="display: none;"><i class="fas fa-coins"></i> Стоимость: 5 AI-Кредитов</div>
            <button class="generate-btn" id="generateBtn">Создать изображение</button>
            <div class="result-area" id="resultArea">
                Здесь появится результат генерации
            </div>
        </div>

        <footer>
            <p>© 2026 AI-Hub. Все права защищены.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </footer>
    </div>

    <!-- Модалки -->
    <div class="modal" id="authModal">
        <!-- ... (та же форма, что и в index) ... -->
    </div>
    <div class="modal" id="topupModal">
        <!-- ... (та же форма пополнения) ... -->
    </div>

    <script>
        // ======== АВТОРИЗАЦИЯ ========
        (() => {
            const USERS_KEY = 'aihub_users';
            const CURRENT_USER_KEY = 'aihub_currentUser';
            const BALANCES_KEY = 'aihub_balances';

            const getUsers = () => JSON.parse(localStorage.getItem(USERS_KEY)) || [];
            const saveUsers = (users) => localStorage.setItem(USERS_KEY, JSON.stringify(users));
            const getCurrentUser = () => JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            const setCurrentUser = (user) => localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
            const clearCurrentUser = () => localStorage.removeItem(CURRENT_USER_KEY);
            const getBalances = () => JSON.parse(localStorage.getItem(BALANCES_KEY)) || {};
            const saveBalances = (balances) => localStorage.setItem(BALANCES_KEY, JSON.stringify(balances));
            const getUserBalance = (userId) => {
                const b = getBalances();
                return b[userId] || 0;
            };
            const setUserBalance = (userId, amount) => {
                const b = getBalances();
                b[userId] = amount;
                saveBalances(b);
            };
            const START_BALANCE = 50;

            const authArea = document.getElementById('authArea');
            const authModal = document.getElementById('authModal');
            const closeAuthModalBtn = document.getElementById('closeAuthModal');
            const topupModal = document.getElementById('topupModal');
            const closeTopupModalBtn = document.getElementById('closeTopupModal');
            const tabs = document.querySelectorAll('#authModal .modal-tab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginName = document.getElementById('loginName');
            const loginPassword = document.getElementById('loginPassword');
            const loginError = document.getElementById('loginError');
            const regName = document.getElementById('regName');
            const regPassword = document.getElementById('regPassword');
            const regPassword2 = document.getElementById('regPassword2');
            const regNameError = document.getElementById('regNameError');
            const regPassError = document.getElementById('regPassError');
            const regPass2Error = document.getElementById('regPass2Error');
            const packageBtns = document.querySelectorAll('.package-btn');
            const customAmountInput = document.getElementById('customAmount');
            const priceEstimate = document.getElementById('priceEstimate');
            const buyBtn = document.getElementById('buyBtn');
            const topupError = document.getElementById('topupError');
            const calculateCustomBtn = document.getElementById('calculateCustomBtn');

            let selectedAmount = null;

            // Функция показа/скрытия цен
            function updatePriceVisibility() {
                const priceTag = document.getElementById('photoPriceTag');
                if (priceTag) {
                    priceTag.style.display = getCurrentUser() ? 'inline-block' : 'none';
                }
            }

            function renderAuthArea() {
                const user = getCurrentUser();
                authArea.innerHTML = '';
                if (user) {
                    const balance = getUserBalance(user.id);
                    const profileDiv = document.createElement('div');
                    profileDiv.className = 'profile-info';
                    profileDiv.innerHTML = `
                        <div class="user-data">
                            <span class="user-name">${user.name}</span>
                            <span class="user-id">ID: ${user.id}</span>
                        </div>
                        <div class="balance-area">
                            <i class="fas fa-coins coin-icon"></i>
                            <span class="balance-amount" id="balanceDisplay">${balance}</span>
                        </div>
                        <button class="topup-btn" id="topupBtn">+ Пополнить</button>
                        <button class="logout-btn" id="logoutBtn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                    `;
                    authArea.appendChild(profileDiv);
                    document.getElementById('topupBtn').addEventListener('click', openTopupModal);
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'glass-btn';
                    btn.id = 'authBtn';
                    btn.textContent = 'Войти';
                    btn.addEventListener('click', openAuthModal);
                    authArea.appendChild(btn);
                }
                updatePriceVisibility();
            }

            function updateBalanceDisplay() {
                const user = getCurrentUser();
                if (user) {
                    const balance = getUserBalance(user.id);
                    const disp = document.getElementById('balanceDisplay');
                    if (disp) disp.textContent = balance;
                }
            }

            function openAuthModal() {
                authModal.classList.add('active');
                loginForm.reset();
                registerForm.reset();
                hideAuthErrors();
                switchAuthTab('login');
            }
            function closeAuthModal() { authModal.classList.remove('active'); }
            function hideAuthErrors() {
                loginError.style.display = 'none';
                regNameError.style.display = 'none';
                regPassError.style.display = 'none';
                regPass2Error.style.display = 'none';
            }
            function switchAuthTab(tab) {
                tabs.forEach(t => t.classList.remove('active'));
                if (tab === 'login') {
                    document.querySelector('[data-tab="login"]').classList.add('active');
                    loginForm.style.display = 'block';
                    registerForm.style.display = 'none';
                } else {
                    document.querySelector('[data-tab="register"]').classList.add('active');
                    loginForm.style.display = 'none';
                    registerForm.style.display = 'block';
                }
                hideAuthErrors();
            }

            function isValidUsername(name) { return /^[a-zA-Z0-9]+$/.test(name); }
            function generateUserId() { return 'U' + Math.random().toString(16).slice(2, 10).toUpperCase(); }

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                hideAuthErrors();
                const name = loginName.value.trim();
                const pass = loginPassword.value;
                if (!isValidUsername(name)) {
                    loginError.textContent = 'Имя может содержать только латинские буквы и цифры';
                    loginError.style.display = 'block';
                    return;
                }
                const users = getUsers();
                const user = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.password === pass);
                if (!user) {
                    loginError.textContent = 'Неверное имя пользователя или пароль';
                    loginError.style.display = 'block';
                    return;
                }
                setCurrentUser({ name: user.name, id: user.id });
                closeAuthModal();
                renderAuthArea();
            });

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                hideAuthErrors();
                const name = regName.value.trim();
                const pass = regPassword.value;
                const pass2 = regPassword2.value;
                if (!isValidUsername(name)) {
                    regNameError.textContent = 'Имя может содержать только латинские буквы и цифры';
                    regNameError.style.display = 'block';
                    return;
                }
                if (pass.length < 6) {
                    regPassError.textContent = 'Пароль должен быть не менее 6 символов';
                    regPassError.style.display = 'block';
                    return;
                }
                if (pass !== pass2) {
                    regPass2Error.textContent = 'Пароли не совпадают';
                    regPass2Error.style.display = 'block';
                    return;
                }
                const users = getUsers();
                if (users.some(u => u.name.toLowerCase() === name.toLowerCase())) {
                    regNameError.textContent = 'Пользователь с таким именем уже существует';
                    regNameError.style.display = 'block';
                    return;
                }
                const newUser = { name, password: pass, id: generateUserId() };
                users.push(newUser);
                saveUsers(users);
                setUserBalance(newUser.id, START_BALANCE);
                setCurrentUser({ name: newUser.name, id: newUser.id });
                closeAuthModal();
                renderAuthArea();
            });

            function logout() {
                clearCurrentUser();
                renderAuthArea();
            }

            tabs.forEach(tab => tab.addEventListener('click', () => switchAuthTab(tab.dataset.tab)));
            closeAuthModalBtn.addEventListener('click', closeAuthModal);
            window.addEventListener('click', (e) => {
                if (e.target === authModal) closeAuthModal();
                if (e.target === topupModal) closeTopupModal();
            });

            function openTopupModal() {
                topupModal.classList.add('active');
                selectedAmount = null;
                customAmountInput.value = '';
                priceEstimate.textContent = '';
                buyBtn.disabled = true;
                topupError.style.display = 'none';
            }
            function closeTopupModal() { topupModal.classList.remove('active'); }
            closeTopupModalBtn.addEventListener('click', closeTopupModal);

            packageBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedAmount = parseInt(btn.dataset.amount);
                    customAmountInput.value = '';
                    const price = Math.round(selectedAmount * 0.99);
                    priceEstimate.textContent = `К оплате: ${price} ₽`;
                    buyBtn.disabled = false;
                    topupError.style.display = 'none';
                });
            });

            calculateCustomBtn.addEventListener('click', () => {
                const val = parseInt(customAmountInput.value);
                if (isNaN(val) || val < 1) {
                    priceEstimate.textContent = 'Введите корректную сумму';
                    buyBtn.disabled = true;
                    return;
                }
                selectedAmount = val;
                const price = (val * 0.99).toFixed(2);
                priceEstimate.textContent = `К оплате: ${price} ₽`;
                buyBtn.disabled = false;
                topupError.style.display = 'none';
            });

            buyBtn.addEventListener('click', () => {
                if (!selectedAmount || selectedAmount < 1) return;
                const user = getCurrentUser();
                if (!user) {
                    topupError.textContent = 'Ошибка авторизации';
                    topupError.style.display = 'block';
                    return;
                }
                const currentBalance = getUserBalance(user.id);
                const newBalance = currentBalance + selectedAmount;
                setUserBalance(user.id, newBalance);
                updateBalanceDisplay();
                alert(`✅ Баланс пополнен на ${selectedAmount} AI-Кредитов.\nТекущий баланс: ${newBalance} кредитов.`);
                closeTopupModal();
            });

            renderAuthArea();
        })();

        // ======== ГЕНЕРАЦИЯ ФОТО ========
        document.getElementById('generateBtn').addEventListener('click', () => {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) { alert('Введите описание изображения'); return; }

            const user = JSON.parse(localStorage.getItem('aihub_currentUser'));
            if (!user) {
                alert('Для генерации необходимо войти в аккаунт.');
                document.getElementById('authModal').classList.add('active');
                return;
            }

            const balances = JSON.parse(localStorage.getItem('aihub_balances') || '{}');
            const balance = balances[user.id] || 0;
            if (balance < 5) {
                alert(`Недостаточно AI-Кредитов. Ваш баланс: ${balance}. Пополните счёт.`);
                document.getElementById('topupModal').classList.add('active');
                return;
            }

            const newBalance = balance - 5;
            balances[user.id] = newBalance;
            localStorage.setItem('aihub_balances', JSON.stringify(balances));

            const balanceDisplay = document.getElementById('balanceDisplay');
            if (balanceDisplay) balanceDisplay.textContent = newBalance;

            const resultDiv = document.getElementById('resultArea');
            resultDiv.innerHTML = '<div class="spinner" style="margin: 0 auto;"></div><div style="margin-top: 12px;">Генерация...</div>';
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div style="text-align: center;">
                        <i class="fas fa-image" style="font-size: 3rem; color: #a855f7; margin-bottom: 12px; display: block;"></i>
                        <strong>Ваше изображение готово!</strong><br>
                        ⚡ (Демо-режим. Реальная генерация будет доступна в следующей версии.)
                        <div style="margin-top: 12px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 16px;">
                            🖼️ Ваш промпт: «${prompt.slice(0, 100)}${prompt.length > 100 ? '…' : ''}»
                        </div>
                    </div>
                `;
            }, 2000);
        });
    </script>
</body>
</html>
