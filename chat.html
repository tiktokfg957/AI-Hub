<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Чат | AI-Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Стили для страницы чата – дополнение к глобальным */
        .chat-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(20,20,40,0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(168,85,247,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 70vh;
            min-height: 500px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-message {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .chat-message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .chat-message.ai {
            align-self: flex-start;
        }
        .message-bubble {
            padding: 12px 18px;
            border-radius: 24px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(168,85,247,0.3);
            color: #eef2ff;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .chat-message.user .message-bubble {
            background: rgba(168,85,247,0.3);
            border-color: #a855f7;
        }
        .message-time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
            text-align: right;
        }
        .chat-input-area {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(168,85,247,0.3);
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(168,85,247,0.5);
            border-radius: 40px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
        }
        .chat-input-area input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 8px rgba(168,85,247,0.4);
        }
        .chat-input-area button {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border: none;
            border-radius: 40px;
            padding: 0 28px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-input-area button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        .typing-indicator-chat {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            width: fit-content;
        }
        .typing-indicator-chat span {
            width: 8px;
            height: 8px;
            background: #a855f7;
            border-radius: 50%;
            display: inline-block;
            animation: typing 1.2s infinite ease-in-out;
        }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        .back-btn {
            margin-bottom: 16px;
            display: inline-block;
            background: none;
            border: none;
            color: #a855f7;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span>AI-Hub</span>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="about.html">О нас</a>
                <a href="blog.html">Блог</a>
                <a href="contacts.html">Контакты</a>
            </nav>
            <button class="glass-btn" onclick="window.location.href='index.html'">На главную</button>
        </header>

        <main>
            <div style="margin-bottom: 24px;">
                <button class="back-btn" onclick="history.back()">← Назад</button>
            </div>
            <h1 style="text-align: center; margin-bottom: 24px;">AI Чат</h1>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message ai">
                        <div class="message-bubble">
                            Привет! Я AI-ассистент AI-Hub. Задавай любые вопросы, я помогу.
                            <div class="message-time">только что</div>
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
                    <button id="sendBtn">Отправить</button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 AI-Hub. Все права защищены.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </footer>
    </div>

    <script>
        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser = true) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${isUser ? 'user' : 'ai'}`;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    ${text}
                    <div class="message-time">${time}</div>
                </div>
            `;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicatorDiv = document.createElement('div');
            indicatorDiv.className = 'chat-message ai';
            indicatorDiv.id = 'typingIndicator';
            indicatorDiv.innerHTML = `
                <div class="typing-indicator-chat">
                    <span></span><span></span><span></span>
                </div>
            `;
            messagesContainer.appendChild(indicatorDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function getAIResponse(userMessage) {
            const lowerMsg = userMessage.toLowerCase();
            if (lowerMsg.includes('привет') || lowerMsg.includes('здравствуй')) {
                return "Привет! Рад тебя видеть. Чем могу помочь?";
            } else if (lowerMsg.includes('как дела')) {
                return "У меня всё отлично! Я здесь, чтобы помогать тебе. А у тебя?";
            } else if (lowerMsg.includes('что ты умеешь')) {
                return "Я умею отвечать на вопросы, генерировать идеи, помогать с текстами. В будущем я смогу создавать картинки и видео!";
            } else if (lowerMsg.includes('помощь')) {
                return "Можешь спросить меня о чём угодно: технологии, творчество, советы. Попробуй!";
            } else {
                return "Интересный вопрос! Я пока учусь, но скоро смогу отвечать подробнее. Попробуй спросить что-то ещё!";
            }
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            messageInput.value = '';
            showTypingIndicator();

            setTimeout(() => {
                const reply = getAIResponse(text);
                removeTypingIndicator();
                addMessage(reply, false);
            }, 1000 + Math.random() * 1000);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
