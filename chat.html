<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Чат | AI-Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ... сохраняем старые стили чата ... */
        .chat-container {
            max-width: 900px; margin: 0 auto; background: rgba(20,20,40,0.5);
            backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid rgba(168,85,247,0.3);
            overflow: hidden; display: flex; flex-direction: column; height: 70vh; min-height: 500px;
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .chat-message { display: flex; gap: 12px; max-width: 80%; }
        .chat-message.user { align-self: flex-end; flex-direction: row-reverse; }
        .chat-message.ai { align-self: flex-start; }
        .message-bubble { padding: 12px 18px; border-radius: 24px; background: rgba(0,0,0,0.4); border: 1px solid rgba(168,85,247,0.3); color: #eef2ff; font-size: 0.95rem; line-height: 1.4; }
        .chat-message.user .message-bubble { background: rgba(168,85,247,0.3); border-color: #a855f7; }
        .message-time { font-size: 0.7rem; color: #888; margin-top: 4px; text-align: right; }
        .chat-input-area { padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(168,85,247,0.3); display: flex; gap: 12px; }
        .chat-input-area input { flex: 1; background: rgba(0,0,0,0.5); border: 1px solid rgba(168,85,247,0.5); border-radius: 40px; padding: 14px 20px; color: white; font-size: 1rem; }
        .chat-input-area input:focus { outline: none; border-color: #a855f7; box-shadow: 0 0 8px rgba(168,85,247,0.4); }
        .chat-input-area button { background: linear-gradient(90deg, #a855f7, #ec4899); border: none; border-radius: 40px; padding: 0 28px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .chat-input-area button:hover { opacity: 0.9; transform: scale(0.98); }

        /* auth styles (скопированы из index) */
        .auth-area { display: flex; align-items: center; gap: 12px; }
        .glass-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 10px 24px; border-radius: 40px; color: white; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .glass-btn:hover { background: rgba(168,85,247,0.3); border-color: #a855f7; }
        .profile-info { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(168,85,247,0.4); border-radius: 40px; padding: 6px 18px 6px 12px; }
        .user-data { display: flex; flex-direction: column; color: #fff; }
        .user-name { font-weight: 600; font-size: 0.9rem; }
        .user-id { font-size: 0.7rem; color: #a855f7; }
        .balance-area { display: flex; align-items: center; gap: 6px; background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4); border-radius: 20px; padding: 4px 10px; }
        .balance-area .coin-icon { color: #FFD700; font-size: 1rem; }
        .balance-amount { font-weight: 600; color: #FFD700; font-size: 0.9rem; }
        .topup-btn { background: rgba(168,85,247,0.2); border: 1px solid #a855f7; color: #a855f7; font-size: 0.85rem; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        .logout-btn { background: none; border: none; color: #ff4d6a; font-size: 1.1rem; cursor: pointer; padding: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: rgba(20,20,40,0.95); backdrop-filter: blur(12px); border: 1px solid rgba(168,85,247,0.4); border-radius: 32px; padding: 32px; max-width: 400px; width: 90%; position: relative; animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: #aaa; font-size: 1.5rem; cursor: pointer; }
        .modal-tabs { display: flex; margin-bottom: 24px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; font-weight: 500; color: #aaa; transition: 0.2s; border-bottom: 2px solid transparent; }
        .modal-tab.active { color: #a855f7; border-bottom-color: #a855f7; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #ccc; }
        .form-group input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(168,85,247,0.5); border-radius: 12px; padding: 12px; color: white; font-family: 'Inter', sans-serif; }
        .form-group input:focus { outline: none; border-color: #a855f7; }
        .error-msg { color: #ff6b7a; font-size: 0.8rem; margin-top: 4px; display: none; }
        .submit-btn { background: linear-gradient(90deg, #a855f7, #ec4899); border: none; width: 100%; padding: 12px; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; margin-top: 8px; font-family: 'Inter', sans-serif; }
        .package-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .package-btn { background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.4); border-radius: 16px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; color: #fff; }
        .package-btn:hover { background: rgba(168,85,247,0.3); border-color: #a855f7; }
        .package-amount { font-size: 1.2rem; font-weight: 700; color: #FFD700; }
        .package-price { font-size: 0.85rem; color: #aaa; }
        .custom-amount { display: flex; gap: 10px; align-items: center; }
        .custom-amount input { flex: 1; }
        .price-estimate { margin: 8px 0; font-size: 0.9rem; color: #FFD700; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span>AI-Hub</span>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="about.html">О нас</a>
                <a href="blog.html">Блог</a>
                <a href="contacts.html">Контакты</a>
            </nav>
            <div class="auth-area" id="authArea">
                <button class="glass-btn" id="authBtn">Войти</button>
            </div>
        </header>

        <main>
            <div style="margin-bottom: 24px;">
                <button class="back-btn" onclick="history.back()">← Назад</button>
            </div>
            <h1 style="text-align: center; margin-bottom: 24px;">AI Чат</h1>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="chat-message ai">
                        <div class="message-bubble">
                            Привет! Я AI-ассистент AI-Hub. Задавай любые вопросы, я помогу.
                            <div class="message-time">только что</div>
                        </div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Напишите сообщение..." autocomplete="off">
                    <button id="sendBtn">Отправить</button>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 AI-Hub. Все права защищены.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </footer>
    </div>

    <!-- Модальные окна входа/регистрации и пополнения -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" id="closeAuthModal">&times;</button>
            <div class="modal-tabs">
                <div class="modal-tab active" data-tab="login">Вход</div>
                <div class="modal-tab" data-tab="register">Регистрация</div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Имя пользователя (латиница)</label>
                    <input type="text" id="loginName" placeholder="username" required>
                    <div class="error-msg" id="loginError"></div>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Пароль" required>
                </div>
                <button type="submit" class="submit-btn">Войти</button>
            </form>
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Имя пользователя (латиница)</label>
                    <input type="text" id="regName" placeholder="username" required>
                    <div class="error-msg" id="regNameError"></div>
                </div>
                <div class="form-group">
                    <label>Пароль (минимум 6 символов)</label>
                    <input type="password" id="regPassword" placeholder="Пароль" required>
                    <div class="error-msg" id="regPassError"></div>
                </div>
                <div class="form-group">
                    <label>Повторите пароль</label>
                    <input type="password" id="regPassword2" placeholder="Пароль ещё раз" required>
                    <div class="error-msg" id="regPass2Error"></div>
                </div>
                <button type="submit" class="submit-btn">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <div class="modal" id="topupModal">
        <div class="modal-content" style="max-width: 420px;">
            <button class="modal-close" id="closeTopupModal">&times;</button>
            <h3 style="margin-bottom: 16px; font-weight: 600;">Пополнение AI-Кредитов</h3>
            <div class="package-grid">
                <div class="package-btn" data-amount="100">100<br><span class="package-price">99 ₽</span></div>
                <div class="package-btn" data-amount="500">500<br><span class="package-price">449 ₽</span></div>
                <div class="package-btn" data-amount="1000">1 000<br><span class="package-price">849 ₽</span></div>
                <div class="package-btn" data-amount="5000">5 000<br><span class="package-price">3 999 ₽</span></div>
                <div class="package-btn" data-amount="10000">10 000<br><span class="package-price">7 499 ₽</span></div>
            </div>
            <div class="custom-amount">
                <input type="number" id="customAmount" placeholder="Введите сумму кредитов" min="1">
                <button class="submit-btn" id="calculateCustomBtn" style="width: auto; margin: 0;">Рассчитать</button>
            </div>
            <div class="price-estimate" id="priceEstimate"></div>
            <button class="submit-btn" id="buyBtn" disabled>Купить</button>
            <p class="error-msg" id="topupError" style="margin-top: 8px;"></p>
        </div>
    </div>

    <script>
        // ======== АВТОРИЗАЦИЯ И БАЛАНС ========
        (() => {
            const USERS_KEY = 'aihub_users';
            const CURRENT_USER_KEY = 'aihub_currentUser';
            const BALANCES_KEY = 'aihub_balances';

            const getUsers = () => JSON.parse(localStorage.getItem(USERS_KEY)) || [];
            const saveUsers = (users) => localStorage.setItem(USERS_KEY, JSON.stringify(users));
            const getCurrentUser = () => JSON.parse(localStorage.getItem(CURRENT_USER_KEY));
            const setCurrentUser = (user) => localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
            const clearCurrentUser = () => localStorage.removeItem(CURRENT_USER_KEY);
            const getBalances = () => JSON.parse(localStorage.getItem(BALANCES_KEY)) || {};
            const saveBalances = (balances) => localStorage.setItem(BALANCES_KEY, JSON.stringify(balances));
            const getUserBalance = (userId) => { const b = getBalances(); return b[userId] || 0; };
            const setUserBalance = (userId, amount) => { const b = getBalances(); b[userId] = amount; saveBalances(b); };

            const START_BALANCE = 50;

            const authArea = document.getElementById('authArea');
            const authModal = document.getElementById('authModal');
            const closeAuthModalBtn = document.getElementById('closeAuthModal');
            const topupModal = document.getElementById('topupModal');
            const closeTopupModalBtn = document.getElementById('closeTopupModal');
            const tabs = document.querySelectorAll('#authModal .modal-tab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const loginName = document.getElementById('loginName');
            const loginPassword = document.getElementById('loginPassword');
            const loginError = document.getElementById('loginError');
            const regName = document.getElementById('regName');
            const regPassword = document.getElementById('regPassword');
            const regPassword2 = document.getElementById('regPassword2');
            const regNameError = document.getElementById('regNameError');
            const regPassError = document.getElementById('regPassError');
            const regPass2Error = document.getElementById('regPass2Error');
            const packageBtns = document.querySelectorAll('.package-btn');
            const customAmountInput = document.getElementById('customAmount');
            const priceEstimate = document.getElementById('priceEstimate');
            const buyBtn = document.getElementById('buyBtn');
            const topupError = document.getElementById('topupError');
            const calculateCustomBtn = document.getElementById('calculateCustomBtn');

            let selectedAmount = null;

            function renderAuthArea() {
                const user = getCurrentUser();
                authArea.innerHTML = '';
                if (user) {
                    const balance = getUserBalance(user.id);
                    const div = document.createElement('div');
                    div.className = 'profile-info';
                    div.innerHTML = `
                        <div class="user-data">
                            <span class="user-name">${user.name}</span>
                            <span class="user-id">ID: ${user.id}</span>
                        </div>
                        <div class="balance-area">
                            <i class="fas fa-coins coin-icon"></i>
                            <span class="balance-amount" id="balanceDisplay">${balance}</span>
                        </div>
                        <button class="topup-btn" id="topupBtn">+ Пополнить</button>
                        <button class="logout-btn" id="logoutBtn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
                    `;
                    authArea.appendChild(div);
                    document.getElementById('topupBtn').addEventListener('click', openTopupModal);
                    document.getElementById('logoutBtn').addEventListener('click', logout);
                } else {
                    const btn = document.createElement('button');
                    btn.className = 'glass-btn';
                    btn.id = 'authBtn';
                    btn.textContent = 'Войти';
                    btn.addEventListener('click', openAuthModal);
                    authArea.appendChild(btn);
                }
            }

            function updateBalanceDisplay() {
                const user = getCurrentUser();
                if (user) {
                    const balance = getUserBalance(user.id);
                    const disp = document.getElementById('balanceDisplay');
                    if (disp) disp.textContent = balance;
                }
            }

            function openAuthModal() {
                authModal.classList.add('active');
                loginForm.reset(); registerForm.reset();
                hideAuthErrors(); switchAuthTab('login');
            }
            function closeAuthModal() { authModal.classList.remove('active'); }
            function hideAuthErrors() {
                loginError.style.display = 'none';
                regNameError.style.display = 'none';
                regPassError.style.display = 'none';
                regPass2Error.style.display = 'none';
            }
            function switchAuthTab(tab) {
                tabs.forEach(t => t.classList.remove('active'));
                if (tab === 'login') {
                    document.querySelector('[data-tab="login"]').classList.add('active');
                    loginForm.style.display = 'block'; registerForm.style.display = 'none';
                } else {
                    document.querySelector('[data-tab="register"]').classList.add('active');
                    loginForm.style.display = 'none'; registerForm.style.display = 'block';
                }
                hideAuthErrors();
            }

            function isValidUsername(name) { return /^[a-zA-Z0-9]+$/.test(name); }
            function generateUserId() { return 'U' + Math.random().toString(16).slice(2, 10).toUpperCase(); }

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); hideAuthErrors();
                const name = loginName.value.trim(), pass = loginPassword.value;
                if (!isValidUsername(name)) {
                    loginError.textContent = 'Имя может содержать только латинские буквы и цифры'; loginError.style.display = 'block'; return;
                }
                const users = getUsers();
                const user = users.find(u => u.name.toLowerCase() === name.toLowerCase() && u.password === pass);
                if (!user) {
                    loginError.textContent = 'Неверное имя пользователя или пароль'; loginError.style.display = 'block'; return;
                }
                setCurrentUser({ name: user.name, id: user.id });
                closeAuthModal(); renderAuthArea();
            });

            registerForm.addEventListener('submit', (e) => {
                e.preventDefault(); hideAuthErrors();
                const name = regName.value.trim(), pass = regPassword.value, pass2 = regPassword2.value;
                if (!isValidUsername(name)) {
                    regNameError.textContent = 'Имя может содержать только латинские буквы и цифры'; regNameError.style.display = 'block'; return;
                }
                if (pass.length < 6) {
                    regPassError.textContent = 'Пароль должен быть не менее 6 символов'; regPassError.style.display = 'block'; return;
                }
                if (pass !== pass2) {
                    regPass2Error.textContent = 'Пароли не совпадают'; regPass2Error.style.display = 'block'; return;
                }
                const users = getUsers();
                if (users.some(u => u.name.toLowerCase() === name.toLowerCase())) {
                    regNameError.textContent = 'Пользователь с таким именем уже существует'; regNameError.style.display = 'block'; return;
                }
                const newUser = { name, password: pass, id: generateUserId() };
                users.push(newUser);
                saveUsers(users);
                setUserBalance(newUser.id, START_BALANCE);
                setCurrentUser({ name: newUser.name, id: newUser.id });
                closeAuthModal(); renderAuthArea();
            });

            function logout() { clearCurrentUser(); renderAuthArea(); }

            tabs.forEach(tab => tab.addEventListener('click', () => switchAuthTab(tab.dataset.tab)));
            closeAuthModalBtn.addEventListener('click', closeAuthModal);
            window.addEventListener('click', (e) => {
                if (e.target === authModal) closeAuthModal();
                if (e.target === topupModal) closeTopupModal();
            });

            function openTopupModal() {
                topupModal.classList.add('active');
                selectedAmount = null; customAmountInput.value = ''; priceEstimate.textContent = ''; buyBtn.disabled = true; topupError.style.display = 'none';
            }
            function closeTopupModal() { topupModal.classList.remove('active'); }
            closeTopupModalBtn.addEventListener('click', closeTopupModal);

            packageBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    selectedAmount = parseInt(btn.dataset.amount);
                    customAmountInput.value = '';
                    const price = Math.round(selectedAmount * 0.99);
                    priceEstimate.textContent = `К оплате: ${price} ₽`;
                    buyBtn.disabled = false; topupError.style.display = 'none';
                });
            });

            calculateCustomBtn.addEventListener('click', () => {
                const val = parseInt(customAmountInput.value);
                if (isNaN(val) || val < 1) { priceEstimate.textContent = 'Введите корректную сумму'; buyBtn.disabled = true; return; }
                selectedAmount = val;
                const price = (val * 0.99).toFixed(2);
                priceEstimate.textContent = `К оплате: ${price} ₽`;
                buyBtn.disabled = false; topupError.style.display = 'none';
            });

            buyBtn.addEventListener('click', () => {
                if (!selectedAmount || selectedAmount < 1) return;
                const user = getCurrentUser();
                if (!user) { topupError.textContent = 'Ошибка авторизации'; topupError.style.display = 'block'; return; }
                const currentBalance = getUserBalance(user.id);
                const newBalance = currentBalance + selectedAmount;
                setUserBalance(user.id, newBalance);
                updateBalanceDisplay();
                alert(`✅ Баланс пополнен на ${selectedAmount} AI-Кредитов.\nТекущий баланс: ${newBalance} кредитов.`);
                closeTopupModal();
            });

            renderAuthArea();
        })();

        // ======== ЛОГИКА ЧАТА ========
        const messagesContainer = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(text, isUser = true) {
            const div = document.createElement('div');
            div.className = `chat-message ${isUser ? 'user' : 'ai'}`;
            const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
            div.innerHTML = `<div class="message-bubble">${text}<div class="message-time">${time}</div></div>`;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'chat-message ai';
            div.id = 'typingIndicator';
            div.innerHTML = '<div class="typing-indicator-chat"><span></span><span></span><span></span></div>';
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const ind = document.getElementById('typingIndicator');
            if (ind) ind.remove();
        }

        function getAIResponse(msg) {
            const lower = msg.toLowerCase();
            if (lower.includes('привет') || lower.includes('здравствуй')) return "Привет! Рад тебя видеть. Чем могу помочь?";
            if (lower.includes('как дела')) return "У меня всё отлично! Я здесь, чтобы помогать тебе. А у тебя?";
            if (lower.includes('что ты умеешь')) return "Я умею отвечать на вопросы, генерировать идеи, помогать с текстами. В будущем я смогу создавать картинки и видео!";
            if (lower.includes('помощь')) return "Можешь спросить меня о чём угодно: технологии, творчество, советы. Попробуй!";
            return "Интересный вопрос! Я пока учусь, но скоро смогу отвечать подробнее. Попробуй спросить что-то ещё!";
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            addMessage(text, true);
            messageInput.value = '';
            showTypingIndicator();
            setTimeout(() => {
                const reply = getAIResponse(text);
                removeTypingIndicator();
                addMessage(reply, false);
            }, 1000 + Math.random() * 1000);
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
