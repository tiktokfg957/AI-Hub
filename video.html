<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Видео | AI-Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .generator-container {
            max-width: 700px;
            margin: 40px auto;
            background: rgba(20,20,40,0.5);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(168,85,247,0.3);
            padding: 32px;
            text-align: center;
        }
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(168,85,247,0.5);
            border-radius: 24px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            resize: vertical;
            margin: 20px 0;
        }
        .generate-btn {
            background: linear-gradient(90deg, #a855f7, #ec4899);
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .result-area {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 24px;
            min-height: 200px;
            max-height: 400px;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
        }
        .back-btn {
            margin-bottom: 16px;
            display: inline-block;
            background: none;
            border: none;
            color: #a855f7;
            cursor: pointer;
            font-size: 1rem;
        }
        .price-tag {
            display: inline-block;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.5);
            border-radius: 20px;
            padding: 4px 12px;
            margin: 12px 0;
            color: #FFD700;
            font-size: 0.9rem;
        }
        .price-tag i { margin-right: 4px; }

        /* auth system */
        .auth-area { display: flex; align-items: center; gap: 12px; }
        .glass-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .glass-btn:hover { background: rgba(168,85,247,0.3); border-color: #a855f7; }
        .profile-info {
            display: flex; align-items: center; gap: 16px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(168,85,247,0.4);
            border-radius: 40px; padding: 6px 18px 6px 12px;
        }
        .user-data { display: flex; flex-direction: column; color: #fff; }
        .user-name { font-weight: 600; font-size: 0.9rem; }
        .user-id { font-size: 0.7rem; color: #a855f7; }
        .balance-area {
            display: flex; align-items: center; gap: 6px;
            background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.4);
            border-radius: 20px; padding: 4px 10px;
        }
        .balance-amount { font-weight: 600; color: #FFD700; font-size: 0.9rem; }
        .topup-btn {
            background: rgba(168,85,247,0.2); border: 1px solid #a855f7;
            color: #a855f7; font-size: 0.85rem; padding: 6px 12px;
            border-radius: 20px; cursor: pointer; font-weight: 600;
        }
        .logout-btn { background: none; border: none; color: #ff4d6a; font-size: 1.1rem; cursor: pointer; padding: 4px; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="glow-orb"></div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">✨</div>
                <span>AI-Hub</span>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="about.html">О нас</a>
                <a href="blog.html">Блог</a>
                <a href="contacts.html">Контакты</a>
            </nav>
            <div class="auth-area" id="authArea">
                <button class="glass-btn" id="authBtn">Войти</button>
            </div>
        </header>

        <div style="margin-bottom: 24px;">
            <button class="back-btn" onclick="history.back()">← Назад</button>
        </div>

        <div class="generator-container">
            <div class="card-header" style="justify-content: center;">
                <div class="card-icon"><i class="fas fa-film"></i></div>
                <h2>Генератор видео</h2>
            </div>
            <p>Опишите сюжет или сцену. AI создаст короткий видеоролик.</p>
            <textarea id="promptInput" rows="4" placeholder="Например: «Закат на Марсе, дюны, космический корабль вдалеке»"></textarea>
            <div class="price-tag"><i class="fas fa-coins"></i> Стоимость: 25 AI-Кредитов</div>
            <button class="generate-btn" id="generateBtn">Создать видео</button>
            <div class="result-area" id="resultArea">
                Здесь появится результат генерации
            </div>
        </div>

        <footer>
            <p>© 2026 AI-Hub. Все права защищены.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </footer>
    </div>

    <!-- Модалки входа/регистрации и пополнения -->
    <div class="modal" id="authModal">
        <!-- ... -->
    </div>
    <div class="modal" id="topupModal">
        <!-- ... -->
    </div>

    <script>
        // Полный скрипт авторизации и пополнения (аналогично index)
        (() => {
            const USERS_KEY = 'aihub_users';
            const CURRENT_USER_KEY = 'aihub_currentUser';
            const BALANCES_KEY = 'aihub_balances';
            // ... все функции ...
        })();

        document.getElementById('generateBtn').addEventListener('click', () => {
            const prompt = document.getElementById('promptInput').value.trim();
            if (!prompt) { alert('Введите описание видео'); return; }

            const user = JSON.parse(localStorage.getItem('aihub_currentUser'));
            if (!user) {
                alert('Для генерации необходимо войти в аккаунт.');
                document.getElementById('authModal').classList.add('active');
                return;
            }

            const balance = JSON.parse(localStorage.getItem('aihub_balances') || '{}')[user.id] || 0;
            if (balance < 25) {
                alert(`Недостаточно AI-Кредитов. Ваш баланс: ${balance}. Пополните счёт.`);
                document.getElementById('topupModal').classList.add('active');
                return;
            }

            const newBalance = balance - 25;
            const balances = JSON.parse(localStorage.getItem('aihub_balances') || '{}');
            balances[user.id] = newBalance;
            localStorage.setItem('aihub_balances', JSON.stringify(balances));

            const balanceDisplay = document.getElementById('balanceDisplay');
            if (balanceDisplay) balanceDisplay.textContent = newBalance;

            const resultDiv = document.getElementById('resultArea');
            resultDiv.innerHTML = '<div class="spinner" style="margin: 0 auto;"></div><div style="margin-top: 12px;">Генерация видео (может занять до 30 секунд)...</div>';
            setTimeout(() => {
                resultDiv.innerHTML = `
                    <div style="text-align: center;">
                        <i class="fas fa-video" style="font-size: 3rem; color: #a855f7; margin-bottom: 12px; display: block;"></i>
                        <strong>Ваше видео готово!</strong><br>
                        🎬 (Демо-режим. Реальная генерация будет доступна в следующей версии.)
                        <div style="margin-top: 12px; background: rgba(255,255,255,0.1); padding: 12px; border-radius: 16px;">
                            📽️ Сценарий: «${prompt.slice(0, 100)}${prompt.length > 100 ? '…' : ''}»
                        </div>
                    </div>
                `;
            }, 3000);
        });
    </script>
</body>
</html>
