<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI-Hub | Главная</title>
    <!-- Подключаем ваш главный CSS файл -->
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>...</header> <!-- Весь ваш header без изменений -->

        <main>
            <div class="hero">
                <h1>Искусственный интеллект<br>на грани реальности</h1>
                <p>Генерация текста, изображений и видео — всё в одном футуристичном интерфейсе</p>
            </div>

            <div class="cards-container">
                <!-- КАРТОЧКА AI ЧАТ - ИСПРАВЛЕНА -->
                <div class="glass-card" data-card="chat">
                    <div class="card-glow"></div>
                    <div class="card-header">
                        <div class="card-icon"><i class="fas fa-brain"></i></div>
                        <h2>AI Чат</h2>
                    </div>
                    <div class="chat-preview">
                        <div class="message-bubble user">Напиши стих про технологии</div>
                        <div class="message-bubble ai">Сеть сплетает провода,<br>В ней пульс идей, как ток, течёт...</div>
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                    <!-- ЭТО ИСПРАВЛЕНИЕ - кнопка-ссылка, которая заменит кнопку с onclick -->
                    <a href="chat.html" style="display: block; text-decoration: none;">
                        <button class="card-btn">Начать диалог</button>
                    </a>
                </div>

                <!-- ОСТАЛЬНЫЕ КАРТОЧКИ (AI Фото и AI Видео) оставьте без изменений -->
                ...
            </div>
        </main>

        <footer>...</footer>
    </div>

    <!-- Подключаем ваш JS файл (оставьте как есть) -->
    <script src="js/main.js"></script>
</body>
</html>
